<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#060a14"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#00c8e0"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(0,240,255,0.08)" stroke-width="2"/>
  <circle cx="256" cy="256" r="175" fill="none" stroke="rgba(0,240,255,0.12)" stroke-width="1" stroke-dasharray="4 6"/>
  <!-- 表盘刻度 -->
  <g stroke="rgba(0,240,255,0.25)" stroke-width="2">
    <line x1="256" y1="72" x2="256" y2="82"/>
    <line x1="256" y1="430" x2="256" y2="440"/>
    <line x1="72" y1="256" x2="82" y2="256"/>
    <line x1="430" y1="256" x2="440" y2="256"/>
  </g>
  <g stroke="rgba(0,240,255,0.12)" stroke-width="1">
    <line x1="160" y1="90" x2="164" y2="99"/>
    <line x1="352" y1="90" x2="348" y2="99"/>
    <line x1="90" y1="160" x2="99" y2="164"/>
    <line x1="90" y1="352" x2="99" y2="348"/>
    <line x1="160" y1="422" x2="164" y2="413"/>
    <line x1="352" y1="422" x2="348" y2="413"/>
    <line x1="422" y1="160" x2="413" y2="164"/>
    <line x1="422" y1="352" x2="413" y2="348"/>
  </g>
  <!-- 外发光线圈 -->
  <circle cx="256" cy="256" r="165" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="30s" repeatCount="indefinite"/>
  </circle>
  <!-- 内圈 -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.15"/>
  <!-- 秒针 -->
  <line x1="256" y1="256" x2="256" y2="152" stroke="#00f0ff" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="6s" repeatCount="indefinite"/>
  </line>
  <!-- 分针 -->
  <line x1="256" y1="256" x2="330" y2="220" stroke="#00ff88" stroke-width="3" stroke-linecap="round" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="60s" repeatCount="indefinite"/>
  </line>
  <!-- 中心点 -->
  <circle cx="256" cy="256" r="8" fill="#00f0ff" opacity="0.9">
    <animate attributeName="r" values="6;9;6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- 文字 -->
  <text x="256" y="430" font-family="'Orbitron',monospace" font-size="32" font-weight="700" fill="#00f0ff" text-anchor="middle" letter-spacing="6" opacity="0.5">OTSYNC</text>
</svg>