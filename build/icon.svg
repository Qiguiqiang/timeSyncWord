<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#070b14"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#00f0ff" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="256" x2="256" y2="150" stroke="#00f0ff" stroke-width="5" stroke-linecap="round" opacity="0.9">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="6s" repeatCount="indefinite"/>
  </line>
  <line x1="256" y1="256" x2="330" y2="256" stroke="#00ff88" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="6s" repeatCount="indefinite"/>
  </line>
  <circle cx="256" cy="256" r="12" fill="#00f0ff">
    <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="256" y="370" font-family="'Orbitron',monospace" font-size="72" font-weight="700" fill="#00f0ff" text-anchor="middle" letter-spacing="8" opacity="0.85">O</text>
  <text x="256" y="420" font-family="'Rajdhani',sans-serif" font-size="28" fill="#00ff88" text-anchor="middle" letter-spacing="6" opacity="0.5">SYNC</text>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.15" stroke-dasharray="8 8"/>
</svg>