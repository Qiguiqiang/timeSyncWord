<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>OpenTimeSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-drag-region" id="titlebarDragRegion">
      <div class="titlebar-title">OpenTimeSync</div>
    </div>
    <div class="titlebar-controls">
      <button class="tb-btn" id="btnSettings">⚙</button>
      <button class="tb-btn" id="btnMinimize">─</button>
      <button class="tb-btn" id="btnMaximize">□</button>
      <button class="tb-btn tb-close" id="btnClose">✕</button>
    </div>
  </div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-group">
      <div class="settings-title">NTP同步</div>
      <button class="sync-btn" id="btnSyncNtpNow" data-tooltip="立即向当前选中的NTP服务器发起一次同步请求，并刷新延迟、偏差、精度与采样结果。不会修改系统时间。">立即同步NTP</button>
      <button class="sync-btn" id="btnSyncNow" data-tooltip="把当前已经校正好的NTP时间写入操作系统时间。会影响整台机器的系统时钟与其他应用读取到的时间。">立即同步到系统</button>
      <label class="sync-toggle" data-tooltip="开启后，软件会按下面设置的间隔自动刷新NTP结果。这里的自动同步只刷新NTP数据，不会自动修改系统时间。">
        <input type="checkbox" id="chkAutoSync">
        <span>自动同步NTP</span>
      </label>
      <div class="sync-interval-row" data-tooltip="自动同步NTP开启后，每隔多少秒主动向NTP服务器刷新一次数据。范围为5到3600秒。">
        <span>NTP间隔</span>
        <input type="number" id="syncInterval" min="5" max="3600" value="30">
        <span>秒</span>
      </div>
      <hr class="sync-divider">
      <div class="sync-status" id="syncStatus"></div>
    </div>
    <div class="settings-group">
      <div class="settings-title">版本与更新</div>
      <div class="version-row" id="versionRow" data-tooltip="显示当前正在运行的应用版本号。这个版本号应与GitHub发布版本和安装包版本保持一致。">
        <span>当前版本：</span>
        <span class="version-num" id="versionNum">--</span>
      </div>
      <button class="sync-btn" id="btnCheckUpdate" data-tooltip="检查是否存在比当前版本更新的发布版本。发现更新后会先下载，再进入安装并重启流程。">检查更新</button>
      <div class="update-status" id="updateStatus"></div>
    </div>
  </div>
  <div class="scanlines"></div>
  <div class="grid-overlay"></div>

  <div class="container">
    <header class="header">
      <div class="status" id="statusBar">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-label" id="statusLabel">INITIALIZING</span>
      </div>
    </header>

    <div class="time-panel">
      <div class="time-display">
        <span class="time-digit" id="timeHours">--</span>
        <span class="time-colon">:</span>
        <span class="time-digit" id="timeMins">--</span>
        <span class="time-colon">:</span>
        <span class="time-digit" id="timeSecs">--</span>
        <span class="time-ms" id="currentMs">.---</span>
      </div>
      <div class="time-meta">
        <span class="meta-item" id="utcDisplay" data-tooltip="协调世界时（UTC），国际标准时间参考">UTC: --</span>
        <span class="meta-divider">|</span>
        <span class="meta-item" id="offsetDisplay" data-tooltip="本机系统时钟与NTP标准时间的偏差">偏差: --</span>
        <span class="meta-divider">|</span>
        <div class="tz-selector">
          <span class="meta-item tz-label" id="tzDisplay">时区: UTC+8 Shanghai ▾</span>
          <div class="tz-panel" id="tzPanel"></div>
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card" data-tooltip="基于时间差稳定性和网络波动计算的同步质量评级">
        <div class="stat-label">精度</div>
        <div class="stat-value">
          <span id="precisionTier">--</span>
          <span class="stat-prec-error" id="precisionError">--</span>
        </div>
        <div class="stat-unit">tier</div>
      </div>
      <div class="stat-card" data-tooltip="本机系统时钟与NTP标准时间的偏差">
        <div class="stat-label">偏差</div>
        <div class="stat-value" id="offsetValue">--</div>
        <div class="stat-unit">ms</div>
      </div>
      <div class="stat-card ntp-card" id="ntpCard">
        <div class="stat-label">网络延迟</div>
        <div class="ntp-row">
          <span class="stat-value" id="ntpRttLabel">--</span>
          <span class="stat-unit ntp-unit">ms</span>
          <span class="ntp-selector" id="ntpSelector">
            <span class="ntp-current" id="ntpName">--</span>
            <span class="ntp-arrow">▾</span>
          </span>
        </div>
        <div class="ntp-panel" id="ntpPanel"></div>
      </div>
      <div class="stat-card" data-tooltip="最近20次同步测量的样本缓冲区。样本越多，抗网络波动能力越强">
        <div class="stat-label">采样</div>
        <div class="stat-value" id="sampleCount">0</div>
        <div class="stat-unit">samples</div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
