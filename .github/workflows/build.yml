name: Build and Release
on:
  push:
    branches: [main]
    tags: ['v*']
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi
          - os: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}
          rustc --version && cargo --version
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Generate icons
        run: npx @tauri-apps/cli icon build/icon.png --output src-tauri/icons
      - name: Build Rust
        run: |
          RUST_BACKTRACE=1 cargo build --release --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }} --verbose 2>&1 | tail -200; EC=${PIPESTATUS[0]}
          echo "== EXIT CODE: $EC =="
          test "$EC" = "0" || exit "$EC"
      - name: Build Tauri bundle
        run: npx tauri build --bundles "${{ matrix.bundles }}" --target ${{ matrix.target }}
      - name: Sign bundles
        env:
          SIGN_KEY: ${{ secrets.UPDATE_PRIVATE_KEY }}
        if: env.SIGN_KEY != ''
        run: |
          KEY_FILE=$(mktemp)
          printf '%s\n' "$SIGN_KEY" > "$KEY_FILE"
          find "src-tauri/target/${{ matrix.target }}/release/bundle" -type f \( \
            -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) \
            | while read f; do
            npx tauri signer sign -k "$KEY_FILE" -p "" "$f"
          done
          rm -f "$KEY_FILE"
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: opentimesync-${{ matrix.os }}-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 7
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          gh release create "${{ github.ref_name }}" \
            --title "OpenTimeSync ${{ github.ref_name }}" \
            --generate-notes --repo ${{ github.repository }} || true
          for dir in opentimesync-*/; do
            find "$dir" -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" \
              -o -name "*.dmg" -o -name "*.tar.gz" -o -name "*.zip" \) -exec \
              gh release upload "${{ github.ref_name }}" {} --clobber --repo ${{ github.repository }} \; || true
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
