name: Build and Release
on:
  push:
    branches: [main]
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: |
          case "${{ matrix.os }}" in
            windows*) PLAT=win32; EXT=zip;;
            ubuntu*)  PLAT=linux; EXT=tar.gz;;
            macos*)   PLAT=darwin; EXT=dmg;;
          esac
          npx @electron/packager . OpenTimeSync --platform=$PLAT --arch=x64 --out=dist --overwrite --icon=build/icon
      - uses: actions/upload-artifact@v4
        with:
          name: opentimesync-${{ matrix.os }}
          path: dist/
          retention-days: 7
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          gh release create "${{ github.ref_name }}" --title "OpenTimeSync ${{ github.ref_name }}" --generate-notes --repo ${{ github.repository }} || true
          gh release upload "${{ github.ref_name }}" opentimesync-ubuntu-latest/OpenTimeSync-linux-x64/OpenTimeSync --clobber --repo ${{ github.repository }} || true
          gh release upload "${{ github.ref_name }}" opentimesync-windows-latest/OpenTimeSync-win32-x64/OpenTimeSync.exe --clobber --repo ${{ github.repository }} || true
          gh release upload "${{ github.ref_name }}" opentimesync-macos-latest/OpenTimeSync-darwin-x64/OpenTimeSync.app --clobber --repo ${{ github.repository }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}