name: Build and Release
on:
  push:
    branches: [main]
    tags: ['v*']
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            bundles: msi
          - os: macos-14
            target: x86_64-apple-darwin
            bundles: dmg
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: v35-${{ matrix.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Generate icons
        run: npx @tauri-apps/cli icon build/icon.png --output src-tauri/icons
      - name: Test Rust compilation
        env:
          RUST_BACKTRACE: 1
        run: |
          cd src-tauri
          cargo check 2>cargo-err.log && EC=0 || EC=$?
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat cargo-err.log >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "EXIT_CODE=$EC" >> "$GITHUB_STEP_SUMMARY"
          echo "EXIT_CODE=$EC"
          exit $EC
      - name: Build Tauri bundle
        run: npx tauri build --bundles "${{ matrix.bundles }}" --target ${{ matrix.target }}
      - name: Sign bundles
        if: false
        env:
          SIGN_KEY: ${{ secrets.UPDATE_PRIVATE_KEY }}
        run: |
          KEY_FILE=$(mktemp)
          printf '%s' "$SIGN_KEY" > "$KEY_FILE"
          find "src-tauri/target/${{ matrix.target }}/release/bundle" -type f \( \
            -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) \
            | while read f; do
            npx tauri signer sign -k "$KEY_FILE" -p "" "$f"
          done
          rm -f "$KEY_FILE"
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: opentimesync-${{ matrix.os }}-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 7
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate updater.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="$GITHUB_REF_NAME"
          REPO="Qiguiqiang/OpenTimeSync"
          BASE="https://github.com/$REPO/releases/download/$TAG"
          UPDATER='{"version":"'"$VERSION"'","notes":"Auto-build","pub_date":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'","platforms":{}}'

          # Windows
          for f in opentimesync-windows-latest-x86_64-pc-windows-msvc/msi/*.msi; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            sigfile="$(dirname "$f")/${name}.sig"
            sig=$(cat "$sigfile" 2>/dev/null || echo "")
            UPDATER=$(echo "$UPDATER" | jq \
              --arg url "$BASE/$name" \
              --arg sig "$sig" \
              '.platforms["windows-x86_64"] = {"signature": $sig, "url": $url}')
          done

          # macOS Intel
          for f in opentimesync-macos-latest-x86_64-apple-darwin/dmg/*.dmg; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            sigfile="$(dirname "$f")/${name}.sig"
            sig=$(cat "$sigfile" 2>/dev/null || echo "")
            UPDATER=$(echo "$UPDATER" | jq \
              --arg url "$BASE/$name" \
              --arg sig "$sig" \
              '.platforms["darwin-x86_64"] = {"signature": $sig, "url": $url}')
          done

          # macOS ARM
          for f in opentimesync-macos-latest-aarch64-apple-darwin/dmg/*.dmg; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            sigfile="$(dirname "$f")/${name}.sig"
            sig=$(cat "$sigfile" 2>/dev/null || echo "")
            UPDATER=$(echo "$UPDATER" | jq \
              --arg url "$BASE/$name" \
              --arg sig "$sig" \
              '.platforms["darwin-aarch64"] = {"signature": $sig, "url": $url}')
          done

          # Linux
          for f in opentimesync-ubuntu-latest-x86_64-unknown-linux-gnu/deb/*.deb; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            sigfile="$(dirname "$f")/${name}.sig"
            sig=$(cat "$sigfile" 2>/dev/null || echo "")
            UPDATER=$(echo "$UPDATER" | jq \
              --arg url "$BASE/$name" \
              --arg sig "$sig" \
              '.platforms["linux-x86_64"] = {"signature": $sig, "url": $url}')
          done

          echo "$UPDATER" | jq . > updater.json
          cat updater.json
      - name: Create Release and Upload
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "OpenTimeSync ${{ github.ref_name }}" \
            --generate-notes --repo ${{ github.repository }} || true
          for dir in opentimesync-*/; do
            find "$dir" -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" \
              -o -name "*.dmg" -o -name "*.tar.gz" -o -name "*.zip" \) -exec \
              gh release upload "${{ github.ref_name }}" {} --clobber --repo ${{ github.repository }} \; || true
          done
          gh release upload "${{ github.ref_name }}" updater.json --clobber --repo ${{ github.repository }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
