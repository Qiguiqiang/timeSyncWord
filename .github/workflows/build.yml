name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        run: npx @electron/packager . OpenTimeSync --platform=win32 --arch=x64 --out=dist --overwrite --icon=build/icon

      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        run: npx @electron/packager . OpenTimeSync --platform=linux --arch=x64 --out=dist --overwrite --icon=build/icon

      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        run: npx @electron/packager . OpenTimeSync --platform=darwin --arch=x64 --out=dist --overwrite --icon=build/icon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opentimesync-${{ matrix.os }}
          path: dist/
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenTimeSync ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            opentimesync-ubuntu-latest/**/*
            opentimesync-windows-latest/**/*
            opentimesync-macos-latest/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
