name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        run: npx @electron/packager . OpenTimeSync --platform=win32 --arch=x64 --out=dist --overwrite --icon=build/icon

      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        run: npx @electron/packager . OpenTimeSync --platform=linux --arch=x64 --out=dist --overwrite --icon=build/icon

      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        run: npx @electron/packager . OpenTimeSync --platform=darwin --arch=x64 --out=dist --overwrite --icon=build/icon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opentimesync-${{ matrix.os }}
          path: dist/
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Zip and Release
        run: |
          cd opentimesync-ubuntu-latest && tar -czf ../OpenTimeSync-linux-x64.tar.gz OpenTimeSync-linux-x64/ && cd ..
          cd opentimesync-windows-latest && zip -r ../OpenTimeSync-win32-x64.zip OpenTimeSync-win32-x64/ && cd ..
          cd opentimesync-macos-latest && tar -czf ../OpenTimeSync-darwin-x64.tar.gz OpenTimeSync-darwin-x64/ && cd ..
          gh release create "${{ github.ref_name }}" \
            --title "OpenTimeSync ${{ github.ref_name }}" \
            --generate-notes \
            OpenTimeSync-linux-x64.tar.gz \
            OpenTimeSync-win32-x64.zip \
            OpenTimeSync-darwin-x64.tar.gz \
            --repo ${{ github.repository }} || \
          gh release upload "${{ github.ref_name }}" \
            OpenTimeSync-linux-x64.tar.gz \
            OpenTimeSync-win32-x64.zip \
            OpenTimeSync-darwin-x64.tar.gz \
            --repo ${{ github.repository }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}