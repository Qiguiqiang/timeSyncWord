name: Build and Release
on:
  push:
    branches: [main]
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi
          - os: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-${{ matrix.target }}-cargo-
      - run: npm ci
      - name: Generate icons
        run: npx @tauri-apps/cli icon build/icon.png --output src-tauri/icons
      - name: Build Tauri
        run: |
          npx tauri build --bundles "${{ matrix.bundles }}" --target ${{ matrix.target }} --verbose > tauri-build.log 2>&1 || EC=$?
          cat tauri-build.log
          test -z "$EC" || exit "$EC"
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-${{ matrix.os }}
          path: tauri-build.log
          retention-days: 1 2>&1 || true
      - name: Show error log
        if: failure()
        run: |
          echo "=== Bundle dir ==="
          ls -la "src-tauri/target/${{ matrix.target }}/release/bundle/" 2>/dev/null || echo "No bundle dir"
          echo "=== Target dir ==="
          ls "src-tauri/target/${{ matrix.target }}/release/" 2>/dev/null | head -20
          echo "=== Last 20 cargo lines ==="
          cat "src-tauri/target/${{ matrix.target }}/release/build/*/output" 2>/dev/null | tail -20 || echo "No build output"
      - name: Sign bundles
        env:
          SIGN_KEY: ${{ secrets.UPDATE_PRIVATE_KEY }}
        if: env.SIGN_KEY != ''
        run: |
          KEY_FILE=$(mktemp)
          printf '%s\n' "$SIGN_KEY" > "$KEY_FILE"
          find "src-tauri/target/${{ matrix.target }}/release/bundle" -type f \( \
            -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) \
            | while read f; do
            npx tauri signer sign -k "$KEY_FILE" -p "" "$f"
          done
          rm -f "$KEY_FILE"
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: opentimesync-${{ matrix.os }}-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 7
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate updater.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="$GITHUB_REF_NAME"
          REPO="Qiguiqiang/OpenTimeSync"
          BASE="https://github.com/$REPO/releases/download/$TAG"
          UPDATER='{"version":"'"$VERSION"'","notes":"Auto-build","pub_date":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'","platforms":{}}'

          # Windows
          for f in opentimesync-windows-latest-x86_64-pc-windows-msvc/msi/*.msi; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            sigfile="$(dirname "$f")/${name}.sig"
            sig=$(cat "$sigfile" 2>/dev/null || echo "")
            UPDATER=$(echo "$UPDATER" | jq \
              --arg url "$BASE/$name" \
              --arg sig "$sig" \
              '.platforms["windows-x86_64"] = {"signature": $sig, "url": $url}')
          done

          # macOS Intel
          for f in opentimesync-macos-latest-x86_64-apple-darwin/dmg/*.dmg; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            sigfile="$(dirname "$f")/${name}.sig"
            sig=$(cat "$sigfile" 2>/dev/null || echo "")
            UPDATER=$(echo "$UPDATER" | jq \
              --arg url "$BASE/$name" \
              --arg sig "$sig" \
              '.platforms["darwin-x86_64"] = {"signature": $sig, "url": $url}')
          done

          # macOS ARM
          for f in opentimesync-macos-latest-aarch64-apple-darwin/dmg/*.dmg; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            sigfile="$(dirname "$f")/${name}.sig"
            sig=$(cat "$sigfile" 2>/dev/null || echo "")
            UPDATER=$(echo "$UPDATER" | jq \
              --arg url "$BASE/$name" \
              --arg sig "$sig" \
              '.platforms["darwin-aarch64"] = {"signature": $sig, "url": $url}')
          done

          # Linux
          for f in opentimesync-ubuntu-latest-x86_64-unknown-linux-gnu/deb/*.deb; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            sigfile="$(dirname "$f")/${name}.sig"
            sig=$(cat "$sigfile" 2>/dev/null || echo "")
            UPDATER=$(echo "$UPDATER" | jq \
              --arg url "$BASE/$name" \
              --arg sig "$sig" \
              '.platforms["linux-x86_64"] = {"signature": $sig, "url": $url}')
          done

          echo "$UPDATER" | jq . > updater.json
          cat updater.json
      - name: Create Release and Upload
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "OpenTimeSync ${{ github.ref_name }}" \
            --generate-notes --repo ${{ github.repository }} || true
          find opentimesync-*/ -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" \
            -o -name "*.dmg" -o -name "*.sig" -o -name "*.tar.gz" -o -name "*.zip" \) -exec \
            gh release upload "${{ github.ref_name }}" {} --clobber --repo ${{ github.repository }} \; || true
          gh release upload "${{ github.ref_name }}" updater.json --clobber --repo ${{ github.repository }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
