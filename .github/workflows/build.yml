name: Build and Release
on:
  push:
    branches: [main]
    tags: ['v*']
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  UPDATE_PRIVATE_KEY: ${{ secrets.UPDATE_PRIVATE_KEY }}
jobs:
  build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      UPDATE_PRIVATE_KEY: ${{ secrets.UPDATE_PRIVATE_KEY }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
          - os: macos-14
            target: x86_64-apple-darwin
            bundles: dmg
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate app version
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          CARGO_VERSION=$(awk -F'"' '/^version = "/ { print $2; exit }' src-tauri/Cargo.toml)
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")

          test "$APP_VERSION" = "$CARGO_VERSION"
          test "$APP_VERSION" = "$TAURI_VERSION"

          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            test "$TAG_VERSION" = "$APP_VERSION"
          fi
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: v35-${{ matrix.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Generate icons
        run: npx @tauri-apps/cli icon build/icon.png --output src-tauri/icons
      - name: Clean cached bundles
        run: rm -rf "src-tauri/target/${{ matrix.target }}/release/bundle"
      - name: Test Rust compilation
        env:
          RUST_BACKTRACE: 1
        run: |
          cd src-tauri
          cargo check --target ${{ matrix.target }} >cargo-out.log 2>cargo-err.log && EC=0 || EC=$?
          cat cargo-out.log || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat cargo-err.log >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "EXIT_CODE=$EC" >> "$GITHUB_STEP_SUMMARY"
          echo "EXIT_CODE=$EC"
          if [[ "$EC" -ne 0 ]]; then
            ERR_SNIPPET="$(sed -n '1,40p' cargo-err.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error::cargo check failed for ${{ matrix.target }}: ${ERR_SNIPPET}"
          fi
          exit $EC
      - name: Build Tauri bundle
        run: npx tauri build --bundles "${{ matrix.bundles }}" --target ${{ matrix.target }}
      - name: Sign bundles
        if: startsWith(github.ref, 'refs/tags/v') && env.UPDATE_PRIVATE_KEY != ''
        env:
          SIGN_KEY: ${{ env.UPDATE_PRIVATE_KEY }}
        run: |
          KEY_FILE=$(mktemp)
          printf '%s' "$SIGN_KEY" > "$KEY_FILE"
          find "src-tauri/target/${{ matrix.target }}/release/bundle" -type f \( \
            -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) \
            | while read f; do
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD="" npx tauri signer sign --private-key-path "$KEY_FILE" "$f"
          done
          rm -f "$KEY_FILE"
      - name: Collect release artifacts
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          mkdir -p release-artifacts
          find "src-tauri/target/${{ matrix.target }}/release/bundle" -type f \( \
            -name "OpenTimeSync_${APP_VERSION}_*.msi" -o \
            -name "OpenTimeSync_${APP_VERSION}_*.msi.sig" -o \
            -name "OpenTimeSync_${APP_VERSION}_*.exe" -o \
            -name "OpenTimeSync_${APP_VERSION}_*.exe.sig" -o \
            -name "OpenTimeSync_${APP_VERSION}_*.dmg" -o \
            -name "OpenTimeSync_${APP_VERSION}_*.dmg.sig" -o \
            -name "OpenTimeSync_${APP_VERSION}_*.deb" -o \
            -name "OpenTimeSync_${APP_VERSION}_*.deb.sig" -o \
            -name "OpenTimeSync_${APP_VERSION}_*.AppImage" -o \
            -name "OpenTimeSync_${APP_VERSION}_*.AppImage.sig" \) \
            -exec cp "{}" release-artifacts/ \;
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: opentimesync-${{ matrix.os }}-${{ matrix.target }}
          path: release-artifacts/
          retention-days: 7
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/download-artifact@v4
      - name: Verify updater signatures
        run: |
          missing=0
          while IFS= read -r -d '' f; do
            if [ ! -f "${f}.sig" ]; then
              echo "Missing updater signature for $f"
              missing=1
            fi
          done < <(find opentimesync-* -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) -print0)

          if [ "$missing" -ne 0 ]; then
            echo "Signed updater artifacts are required for tagged releases."
            exit 1
          fi
      - name: Generate updater.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="$GITHUB_REF_NAME"
          REPO="Qiguiqiang/OpenTimeSync"
          BASE="https://github.com/$REPO/releases/download/$TAG"
          NOTES="$(node scripts/extract-changelog.mjs "$VERSION")"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf '%s\n' "$NOTES" > release-notes.md
          UPDATER=$(jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            '{version:$version,notes:$notes,pub_date:$pub_date,platforms:{}}')
          for d in opentimesync-*/; do
            dir="${d%/}"
            for f in "$dir"/OpenTimeSync_"$VERSION"_*.msi "$dir"/OpenTimeSync_"$VERSION"_*.exe "$dir"/OpenTimeSync_"$VERSION"_*.dmg "$dir"/OpenTimeSync_"$VERSION"_*.deb "$dir"/OpenTimeSync_"$VERSION"_*.AppImage; do
              [ -f "$f" ] || continue
              bf=$(basename "$f")
              sigfile="$dir/${bf}.sig"
              sig=$(cat "$sigfile" 2>/dev/null || echo "")
              case "$bf" in
                *.msi) plat="windows-x86_64-msi" ;;
                *.exe) plat="windows-x86_64-nsis" ;;
                *.dmg)
                  case "$dir" in
                    *aarch64-apple*) plat="darwin-aarch64" ;;
                    *) plat="darwin-x86_64" ;;
                  esac
                  ;;
                *.deb|*.AppImage) plat="linux-x86_64" ;;
                *) plat="unknown" ;;
              esac
              UPDATER=$(echo "$UPDATER" | jq \
                --arg url "$BASE/$bf" \
                --arg sig "$sig" \
                --arg plat "$plat" \
                '.platforms[$plat] = {"signature": $sig, "url": $url}')
            done
          done

          echo "$UPDATER" | jq . > updater.json
          cat updater.json
      - name: Create Release and Upload
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if gh release view "${{ github.ref_name }}" --repo ${{ github.repository }} >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" \
              --title "OpenTimeSync ${{ github.ref_name }}" \
              --notes-file release-notes.md --repo ${{ github.repository }}
          else
            gh release create "${{ github.ref_name }}" \
              --title "OpenTimeSync ${{ github.ref_name }}" \
              --notes-file release-notes.md --repo ${{ github.repository }}
          fi
          for dir in opentimesync-*/; do
            find "$dir" -type f \( -name "OpenTimeSync_${VERSION}_*.deb" -o -name "OpenTimeSync_${VERSION}_*.AppImage" -o -name "OpenTimeSync_${VERSION}_*.msi" -o -name "OpenTimeSync_${VERSION}_*.exe" \
              -o -name "OpenTimeSync_${VERSION}_*.dmg" -o -name "OpenTimeSync_${VERSION}_*.tar.gz" -o -name "OpenTimeSync_${VERSION}_*.zip" \) -exec \
              gh release upload "${{ github.ref_name }}" {} --clobber --repo ${{ github.repository }} \; || true
          done
          gh release upload "${{ github.ref_name }}" updater.json --clobber --repo ${{ github.repository }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
